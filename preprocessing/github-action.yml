# GitHub Actions workflow for FReD Static Apps
# Runs weekly to refresh JSON data files from the FReD database

name: Update FReD Static Data

on:
  # Run weekly on Sundays at 2:00 AM UTC
  schedule:
    - cron: '0 2 * * 0'

  # Allow manual trigger
  workflow_dispatch:

  # Run on push to main for testing (optional, can be removed)
  push:
    branches:
      - main
    paths:
      - 'fred-static/preprocessing/**'

jobs:
  update-data:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::FReD
            any::dplyr
            any::jsonlite
            any::stringr

      - name: Install FReD package (development version)
        run: |
          Rscript -e 'remotes::install_local(".", dependencies = TRUE, upgrade = "never")'

      - name: Run preprocessing scripts
        run: |
          cd fred-static/preprocessing
          Rscript process-explorer-data.R ../data
          Rscript process-flora-data.R ../data

      - name: Check for changes
        id: check_changes
        run: |
          git diff --quiet fred-static/data/ || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add fred-static/data/
          git commit -m "Update FReD static data - $(date -u +'%Y-%m-%d')"
          git push

      - name: Report status
        run: |
          echo "Data files updated successfully!"
          ls -la fred-static/data/
          echo "Explorer data size: $(du -h fred-static/data/explorer-data.json | cut -f1)"
          echo "Flora data size: $(du -h fred-static/data/flora-data.json | cut -f1)"
